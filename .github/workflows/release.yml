name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.3.0)"
        required: true
        default: "v0.3.0"

env:
  VERSION: ${{ github.ref_name || inputs.version }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller pillow requests pyautogui pyperclip pynput psutil pywin32 pdfplumber

      - name: Build
        run: pyinstaller pushpa.spec --noconfirm

      - name: Zip
        run: Compress-Archive -Path dist\AIcursor-windows\* -DestinationPath dist\AIcursor-windows-${{ env.VERSION }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/AIcursor-windows-*.zip

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      # Use Homebrew Python directly — avoids setup-python / Node.js issues
      - name: Install Python 3.11 via Homebrew
        run: |
          brew install python@3.11
          echo "/usr/local/opt/python@3.11/bin" >> $GITHUB_PATH

      - name: Verify Python
        run: python3.11 --version

      - name: Install dependencies
        run: |
          python3.11 -m pip install --upgrade pip
          python3.11 -m pip install pyinstaller pillow requests pyautogui pyperclip pynput pdfplumber
          # pyobjc is optional — app degrades gracefully without it
          python3.11 -m pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-Quartz \
            pyobjc-framework-ApplicationServices 2>/dev/null || echo "pyobjc skipped"

      - name: Build with PyInstaller
        run: python3.11 -m PyInstaller pushpa_macos.spec --noconfirm

      - name: Verify app was created
        run: ls -la dist/

      - name: Package as DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "AI Cursor" \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "AIcursor.app" 175 190 \
            --hide-extension "AIcursor.app" \
            --app-drop-link 425 190 \
            "dist/AIcursor-macos-${{ env.VERSION }}.dmg" \
            "dist/AIcursor.app" || echo "create-dmg done (non-zero is normal)"

      - name: Zip as fallback if DMG missing
        run: |
          if [ ! -f "dist/AIcursor-macos-${{ env.VERSION }}.dmg" ]; then
            echo "No DMG — creating zip fallback"
            cd dist && zip -r "AIcursor-macos-${{ env.VERSION }}.zip" AIcursor.app
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/AIcursor-macos-*.dmg
            dist/AIcursor-macos-*.zip

  # ── Publish ────────────────────────────────────────────────────────────────
  publish:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: dist

      - name: List release files
        run: ls -lh dist/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: AI Cursor ${{ env.VERSION }}
          body: |
            ## AI Cursor ${{ env.VERSION }}

            ### Windows
            1. Download `AIcursor-windows-*.zip`
            2. Extract — right-click → **Extract All**
            3. Open the folder and double-click **AIcursor.exe**
            4. Press **Alt+A** on any text to start

            ### macOS
            1. Download `AIcursor-macos-*.dmg`
            2. Open the DMG, drag **AI Cursor** to Applications
            3. Press **Option+A** on any text to start
          files: dist/*
          make_latest: true

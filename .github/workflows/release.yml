name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.3.0)"
        required: true
        default: "v0.3.0"

env:
  VERSION: ${{ inputs.version || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller pillow requests pyautogui pyperclip pynput psutil pywin32 pdfplumber

      - name: Download Ollama
        run: |
          Invoke-WebRequest -Uri "https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip" -OutFile ollama.zip
          Expand-Archive ollama.zip -DestinationPath ollama_tmp -Force
          New-Item -ItemType Directory -Force -Path ollama | Out-Null
          Copy-Item ollama_tmp\ollama.exe ollama\ollama.exe
          Write-Host "ollama.exe: $([math]::Round((Get-Item ollama\ollama.exe).Length / 1MB, 1)) MB"

      - name: Bundle starter model (qwen2.5:0.5b)
        run: |
          # Start Ollama pointing at our app's models directory
          $modelsDir = "$env:APPDATA\Pushpa\models"
          New-Item -ItemType Directory -Force $modelsDir | Out-Null
          $env:OLLAMA_MODELS = $modelsDir
          $env:OLLAMA_HOST   = "127.0.0.1:11435"
          Start-Process -FilePath "ollama\ollama.exe" -ArgumentList "serve" `
            -NoNewWindow -RedirectStandardOutput "$env:TEMP\ollama_bundle.log" `
            -RedirectStandardError "$env:TEMP\ollama_bundle_err.log"
          Write-Host "Waiting for Ollama to start…"
          $ready = $false
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep 1
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:11435/" -UseBasicParsing -TimeoutSec 1 -EA Stop
              if ($r.StatusCode -eq 200) { $ready = $true; break }
            } catch {}
          }
          if (-not $ready) { Write-Host "Ollama did not start — skipping model bundle"; exit 0 }
          Write-Host "Ollama ready. Pulling qwen2.5:0.5b…"
          $env:OLLAMA_HOST = "127.0.0.1:11435"
          ollama\ollama.exe pull qwen2.5:0.5b
          Write-Host "Pull complete."
          # Stage manifest + blobs
          $manifestSrc = "$modelsDir\manifests\registry.ollama.ai\library\qwen2.5\0.5b"
          if (-not (Test-Path $manifestSrc)) { Write-Host "Manifest not found — skipping"; exit 0 }
          $manifest = Get-Content $manifestSrc | ConvertFrom-Json
          New-Item -ItemType Directory -Force "ollama_starter\blobs" | Out-Null
          New-Item -ItemType Directory -Force "ollama_starter\manifests\registry.ollama.ai\library\qwen2.5" | Out-Null
          Copy-Item $manifestSrc "ollama_starter\manifests\registry.ollama.ai\library\qwen2.5\0.5b"
          $allLayers = @($manifest.config) + $manifest.layers
          foreach ($layer in $allLayers) {
            if ($null -eq $layer) { continue }
            $digest = $layer.digest -replace ":", "-"
            $src = "$modelsDir\blobs\$digest"
            if (Test-Path $src) {
              Copy-Item $src "ollama_starter\blobs\$digest"
              Write-Host "Staged blob: $digest ($([math]::Round((Get-Item $src).Length/1MB,1)) MB)"
            }
          }
          $totalMB = (Get-ChildItem "ollama_starter\blobs" | Measure-Object Length -Sum).Sum / 1MB
          Write-Host "Starter model staged: $([math]::Round($totalMB, 1)) MB total"

      - name: Stamp version
        run: |
          $ver = "${{ env.VERSION }}".TrimStart("v")
          "APP_VERSION = `"$ver`"" | Out-File _version.py -Encoding utf8

      - name: Build with PyInstaller
        run: pyinstaller pushpa.spec --noconfirm

      - name: Build installer with Inno Setup
        run: |
          Write-Host "=== dist contents ==="
          Get-ChildItem dist | Select-Object Name, Length

          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $ver  = "${{ env.VERSION }}".TrimStart("v")
          Write-Host "ISCC path: $iscc  exists: $(Test-Path $iscc)"
          Write-Host "Building installer v$ver"

          if (Test-Path $iscc) {
            & $iscc installer.iss /DMyAppVersion=$ver
            $code = $LASTEXITCODE
            Write-Host "ISCC exit code: $code"
          } else {
            $code = 1
            Write-Host "ISCC not found — skipping"
          }

          if ($code -ne 0 -or -not (Test-Path dist\AIcursor-windows-setup.exe)) {
            Write-Host "Installer not produced — falling back to zip"
            Compress-Archive -Path dist\AIcursor-windows\* -DestinationPath dist\AIcursor-windows-setup.zip -Force
            Write-Host "Zip fallback: $([math]::Round((Get-Item dist\AIcursor-windows-setup.zip).Length / 1MB, 1)) MB"
          } else {
            Write-Host "Installer: $([math]::Round((Get-Item dist\AIcursor-windows-setup.exe).Length / 1MB, 1)) MB"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/AIcursor-windows-setup.exe
            dist/AIcursor-windows-setup.zip

  # ── macOS — two native builds (arm64 + x86_64) on macos-14 ─────────────────
  build-macos:
    runs-on: macos-14
    strategy:
      matrix:
        arch: [arm64, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Install Python 3.11 + tkinter (arm64)
        if: matrix.arch == 'arm64'
        run: |
          brew install python@3.11 python-tk@3.11
          echo "$(brew --prefix)/opt/python@3.11/bin" >> $GITHUB_PATH

      - name: Install Python 3.11 universal2 (x86_64 build)
        if: matrix.arch == 'x86_64'
        run: |
          # Python.org installer ships as universal2 — we run it under Rosetta
          curl -L "https://www.python.org/ftp/python/3.11.11/python-3.11.11-macos11.pkg" \
            -o /tmp/python.pkg
          sudo installer -pkg /tmp/python.pkg -target /
          echo "/Library/Frameworks/Python.framework/Versions/3.11/bin" >> $GITHUB_PATH
          # Verify we get the right arch when running under Rosetta
          echo "Native: $(python3.11 -c 'import platform; print(platform.machine())')"
          echo "Rosetta: $(arch -x86_64 python3.11 -c 'import platform; print(platform.machine())')"

      - name: Install tkinter (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          brew install python-tk@3.11
          # Link Homebrew's tkinter into the Python.org framework
          TK_PATH=$(brew --prefix python-tk@3.11)/libexec
          SITE="/Library/Frameworks/Python.framework/Versions/3.11/lib/python3.11/site-packages"
          ln -sf "$TK_PATH"/_tkinter.cpython-311-darwin.so "$SITE"/ 2>/dev/null || true
          ln -sf "$TK_PATH"/tkinter "$SITE"/ 2>/dev/null || true

      - name: Install dependencies (native arch)
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            # Run pip under Rosetta so it fetches x86_64 wheels
            arch -x86_64 python3.11 -m pip install --upgrade pip
            arch -x86_64 python3.11 -m pip install \
              "pillow>=10.0" \
              "cryptography" \
              "pynput" \
              pyinstaller requests pyautogui pyperclip pdfplumber
            arch -x86_64 python3.11 -m pip install pyobjc-core pyobjc-framework-Cocoa \
              pyobjc-framework-Quartz pyobjc-framework-ApplicationServices \
              2>/dev/null || echo "pyobjc skipped"
          else
            python3.11 -m pip install --upgrade pip
            python3.11 -m pip install \
              "pillow>=10.0" \
              "cryptography" \
              "pynput" \
              pyinstaller requests pyautogui pyperclip pdfplumber
            python3.11 -m pip install pyobjc-core pyobjc-framework-Cocoa \
              pyobjc-framework-Quartz pyobjc-framework-ApplicationServices \
              2>/dev/null || echo "pyobjc skipped"
          fi

      - name: Verify tkinter
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            arch -x86_64 python3.11 -c "import tkinter; print('tkinter OK:', tkinter.TkVersion)"
          else
            python3.11 -c "import tkinter; print('tkinter OK:', tkinter.TkVersion)"
          fi

      - name: Download Ollama binary
        run: |
          mkdir -p ollama
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            curl -L "https://github.com/ollama/ollama/releases/latest/download/ollama-darwin-arm64" \
              -o ollama/ollama
          else
            curl -L "https://github.com/ollama/ollama/releases/latest/download/ollama-darwin-amd64" \
              -o ollama/ollama
          fi
          chmod +x ollama/ollama
          echo "ollama arch: $(lipo -info ollama/ollama 2>/dev/null || file ollama/ollama)"

      - name: Stamp version
        run: |
          ver="${{ env.VERSION }}"
          echo "APP_VERSION = \"${ver#v}\"" > _version.py

      - name: Build native ${{ matrix.arch }} with PyInstaller
        env:
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            arch -x86_64 python3.11 -m PyInstaller pushpa_macos.spec --noconfirm
          else
            python3.11 -m PyInstaller pushpa_macos.spec --noconfirm
          fi

      - name: Verify binary architecture
        run: |
          MAIN="dist/AIcursor.app/Contents/MacOS/AIcursor"
          ARCHS=$(lipo -archs "$MAIN" 2>/dev/null || file -b "$MAIN" | grep -oE 'arm64|x86_64')
          echo "Main binary: $ARCHS"
          if [ "${{ matrix.arch }}" = "arm64" ] && ! echo "$ARCHS" | grep -q "arm64"; then
            echo "ERROR: expected arm64 but got: $ARCHS"
            exit 1
          fi
          if [ "${{ matrix.arch }}" = "x86_64" ] && ! echo "$ARCHS" | grep -q "x86_64"; then
            echo "ERROR: expected x86_64 but got: $ARCHS"
            exit 1
          fi
          echo "✓ ${{ matrix.arch }} binary verified"

      - name: Package as DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "AI Cursor" \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "AIcursor.app" 175 190 \
            --hide-extension "AIcursor.app" \
            --app-drop-link 425 190 \
            "dist/AIcursor-macos-${{ matrix.arch }}.dmg" \
            "dist/AIcursor.app" || echo "create-dmg done (non-zero is normal)"

      - name: Zip as fallback if DMG missing
        run: |
          if [ ! -f "dist/AIcursor-macos-${{ matrix.arch }}.dmg" ]; then
            cd dist && zip -r "AIcursor-macos-${{ matrix.arch }}.zip" AIcursor.app
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ matrix.arch }}
          path: |
            dist/AIcursor-macos-${{ matrix.arch }}.dmg
            dist/AIcursor-macos-${{ matrix.arch }}.zip

  # ── Publish ────────────────────────────────────────────────────────────────
  publish:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: macos-build-arm64
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: macos-build-x86_64
          path: dist

      - name: List release files
        run: ls -lh dist/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: AI Cursor ${{ env.VERSION }}
          body: |
            ## AI Cursor ${{ env.VERSION }}

            ### Windows
            1. Download `AIcursor-windows-setup.exe`
            2. Run the installer — it sets up Start Menu + Desktop shortcuts
            3. On first launch the app downloads the AI model (~1.3 GB) automatically
            4. Press **Alt+A** on any text to start

            ### macOS (Apple Silicon / M1-M4)
            1. Download `AIcursor-macos-arm64.dmg`
            2. Open the DMG, drag **AI Cursor** to Applications
            3. On first launch the app downloads the AI model (~1.3 GB) automatically
            4. Press **Option+A** on any text to start

            ### macOS (Intel)
            1. Download `AIcursor-macos-x86_64.dmg`
            2. Open the DMG, drag **AI Cursor** to Applications
            3. On first launch the app downloads the AI model (~1.3 GB) automatically
            4. Press **Option+A** on any text to start
          files: dist/*
          make_latest: true

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline'">
  <title>Pushpa Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, "SF Pro Text", "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      -webkit-app-region: drag;
    }
    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #ffffff;
      opacity: 0.9;
      margin-bottom: 18px;
      text-transform: uppercase;
    }
    .status {
      font-size: 12px;
      color: #888;
      min-height: 18px;
      transition: color 0.2s;
    }
    .status.error   { color: #e05c5c; }
    .status.ok      { color: #4caf7a; }
    .dot-row {
      display: flex;
      gap: 6px;
      margin-top: 16px;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #333;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { background: #333; }
      40%            { background: #555; }
    }
  </style>
</head>
<body>
  <div class="logo">Pushpa Agent</div>
  <div class="status" id="status">Starting…</div>
  <div class="dot-row">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
